<script>
        (function() {
            const schools = [
                { name: '北京大学', city: '北京', type: '综合类', desc: '中国第一所国立综合性大学，人文社科与理学顶尖。', link: '/peking.html' },
                { name: '清华大学', city: '北京', type: '综合类', desc: '顶尖工科名校，经管、计算机、建筑享誉全球。', link: '/tsinghua.html' },
                { name: '复旦大学', city: '上海', type: '综合类', desc: '华东顶尖名校，新闻、经济、医学实力强劲。', link: '/fudan.html' },
                { name: '南京大学', city: '南京', type: '综合类', desc: '历史悠久，天文、地质、中文实力雄厚。', link: '/nanjing.html' },
                { name: '华中科技大学', city: '武汉', type: '理工类', desc: '机械、光电、医学、生物医学工程领先。', link: '/hust.html' },
                { name: '西安交通大学', city: '西安', type: '综合类', desc: '电气、能动、机械实力强劲，首批985/211。', link: '/xjtu.html' },
                { name: '中山大学', city: '广州', type: '综合类', desc: '三校区五校园，医学、管理、哲学突出。', link: '/sysu.html' },
                { name: '四川大学', city: '成都', type: '综合类', desc: '口腔医学享誉海内外，西部重点综合大学。', link: '/scu.html' },
                { name: '西北工业大学', city: '西安', type: '理工类', desc: '航空、航天、航海特色，“总师摇篮”。', link: '/nwpu.html' },
                { name: '山东大学', city: '济南', type: '综合类', desc: '一校三地办学，数学、中文、医学雄厚。', link: '/sdu.html' },
                { name: '华南理工大学', city: '广州', type: '理工类', desc: '四大工学院之一，工程师的摇篮。', link: '/scut.html' }
            ];

            const cities = [...new Set(schools.map(s => s.city))].sort();
            const types = [...new Set(schools.map(s => s.type))].sort();

            const cityFilters = document.getElementById('cityFilters');
            const typeFilters = document.getElementById('typeFilters');
            const schoolGrid = document.getElementById('schoolGrid');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            let currentCity = 'all';
            let currentType = 'all';
            let searchKeyword = '';

            cityFilters.innerHTML = '<button class="filter-btn active" data-filter="city" data-value="all">全部城市</button>';
            cities.forEach(city => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-filter', 'city');
                btn.setAttribute('data-value', city);
                btn.textContent = city;
                cityFilters.appendChild(btn);
            });

            typeFilters.innerHTML = '<button class="filter-btn active" data-filter="type" data-value="all">全部类型</button>';
            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-filter', 'type');
                btn.setAttribute('data-value', type);
                btn.textContent = type;
                typeFilters.appendChild(btn);
            });

            function renderSchools() {
                const filtered = schools.filter(s => {
                    const cityMatch = currentCity === 'all' || s.city === currentCity;
                    const typeMatch = currentType === 'all' || s.type === currentType;
                    const searchMatch = searchKeyword === '' || s.name.includes(searchKeyword);
                    return cityMatch && typeMatch && searchMatch;
                });

                if (filtered.length === 0) {
                    schoolGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">没有找到匹配的学校</div>';
                    return;
                }

                let html = '';
                filtered.forEach(s => {
                    html += `
                        <div class="school-card">
                            <div class="card-header">
                                <span class="school-name">${s.name}</span>
                                <span class="badge">${s.type}</span>
                            </div>
                            <div class="school-meta">
                                <span>📍 ${s.city}</span>
                                <span>🏛️ ${s.type}</span>
                            </div>
                            <div class="school-desc">${s.desc}</div>
                            <a href=" " class="btn-detail">查看详情 →</a >
                        </div>
                    `;
                });
                schoolGrid.innerHTML = html;
            }

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const filter = this.dataset.filter;
                    const value = this.dataset.value;
                    const group = this.parentNode;
                    group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    if (filter === 'city') currentCity = value;
                    else if (filter === 'type') currentType = value;
                    renderSchools();
                });
            });

            searchBtn.addEventListener('click', () => {
                searchKeyword = searchInput.value.trim();
                renderSchools();
            });
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    searchKeyword = searchInput.value.trim();
                    renderSchools();
                }
            });

            renderSchools();
        })();
    </script>
</body>
</html>
