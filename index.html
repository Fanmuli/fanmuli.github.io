<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '微软雅黑', sans-serif;
        }
        body {
            background: #f4f8ff;
            padding: 30px 20px;
        }
        .container {

            margin: 0 auto;
        }
        h1 {

            color: #1e3a5f;

        }
        .family-tag {
            text-align: center;
            margin-bottom: 30px;
        }
        .family-tag span {
            background: #ffd966;
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            color: #1e3a5f;
        }
        .subtitle {
            text-align: center;
            color: #4a6fa5;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 2px dashed #aac8e0;
            padding-bottom: 15px;
        }
        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .search-box {
            display: flex;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid #b8d1e5;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .search-box input {
            border: none;
            padding: 10px 16px;
            width: 250px;
            font-size: 1rem;
            outline: none;
        }
        .search-box button {
            background: #1e3a5f;
            border: none;
            color: white;
            padding: 0 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #0f2b48;
        }
        .translate-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .translate-btn:hover {
            background: #0f2b48;
        }
        /* 学校网格 */
        .school-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .school-card {
            background: white;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            border: 1px solid #e0ecff;
            transition: transform 0.2s;
        }
        .school-card:hover {
            transform: translateY(-4px);
        }
        .school-card h2 {
            color: #0a2540;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background: #e9eff7;
            color: #1e3a5f;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .school-meta {
            color: #4a6e8c;
            margin-bottom: 15px;
        }
        .school-desc {
            color: #2d4a6e;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .btn-detail {
            display: inline-block;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-detail:hover {
            background: #0f2b48;
        }
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.6);
            border-radius: 40px;
            font-size: 1.2rem;
            color: #5a7f9e;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #6c86a3;
            padding-top: 20px;
            border-top: 1px solid #d0e0ff;
        }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>
<body>

            { name: "中央财经大学", city: "北京", type: "财经类", desc: "中国财经管理专家的摇篮。", link: "cufe.html" },
            { name: "香港中文大学（深圳）", city: "深圳", type: "综合类", desc: "中外合作国际化大学，中英双语教学。", link: "cuhksz.html" },
            { name: "苏州大学", city: "苏州", type: "综合类", desc: "江苏省属重点综合性大学，学科门类齐全。", link: "suda.html" },
            { name: "华中农业大学", city: "武汉", type: "农林类", desc: "以生命科学为特色，农、理、工等多学科协调发展。", link: "hzau.html" },
            { name: "武汉理工大学", city: "武汉", type: "理工类", desc: "材料、船舶、车辆等学科特色鲜明。", link: "whut.html" },
            { name: "中国石油大学（北京）", city: "北京", type: "理工类", desc: "石油石化特色鲜明，能源领域顶尖高校。", link: "cup.html" }
        ];

        // 获取容器
        const schoolGrid = document.getElementById('schoolGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        // 渲染函数（使用绝对路径）
        function renderSchools(keyword = '') {
            const filtered = schoolsData.filter(school => {
                const matchName = school.name.includes(keyword);
                const matchCity = school.city.includes(keyword);
                return matchName || matchCity;
            });

            if (filtered.length === 0) {
                schoolGrid.innerHTML = `<div class="no-result">✨ 没有找到匹配的学校，试试其他关键词吧</div>`;
                return;
            }

            let html = '';
            filtered.forEach(s => {
                html += `
                    <div class="school-card">
                        <h2>${s.name}</h2>
                        <span class="badge">${s.type}</span>
                        <div class="school-meta">📍 ${s.city}</div>
                        <p class="school-desc">${s.desc}</p >
                        <a href="${s.link} " class="btn-detail">查看详情 →</a >
                    </div>
                `;
            });
            schoolGrid.innerHTML = html;
        }

        // 搜索事件
        searchBtn.addEventListener('click', () => {
            const keyword = searchInput.value.trim();
            renderSchools(keyword);
        });
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                const keyword = searchInput.value.trim();
                renderSchools(keyword);
            }
        });

        // 初始渲染
        renderSchools();

        // 翻译功能
        const translateBtn = document.getElementById('translateBtn');
        let googleTranslateLoaded = false;

        function addGoogleTranslate() {
            if (googleTranslateLoaded) return;
            const script = document.createElement('script');
            script.src = "https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
            document.body.appendChild(script);
            window.googleTranslateElementInit = function() {
                new google.translate.TranslateElement({
                    pageLanguage: 'zh-CN',
                    includedLanguages: 'zh-CN,en',
                    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                    autoDisplay: false
                }, 'translateBtn');
                googleTranslateLoaded = true;
            };
        }

        translateBtn.addEventListener('click', () => {
            if (!googleTranslateLoaded) {
                addGoogleTranslate();
                const checkReady = setInterval(() => {
                    if (typeof google !== 'undefined' && google.translate) {
                        clearInterval(checkReady);
                        const select = document.querySelector('.goog-te-combo');
                        if (select) {
                            select.value = 'en';
                            select.dispatchEvent(new Event('change'));
                        } else {
                            setTimeout(() => {
                                const sel = document.querySelector('.goog-te-combo');
                                if (sel) { sel.value = 'en'; sel.dispatchEvent(new Event('change')); }
                            }, 500);
                        }
                    }
                }, 200);
            } else {
                const select = document.querySelector('.goog-te-combo');
                if (select && select.value !== 'en') {
                    select.value = 'en';
                    select.dispatchEvent(new Event('change'));
                } else if (select && select.value === 'en') {
                    select.value = 'zh-CN';
                    select.dispatchEvent(new Event('change'));
                }
            }
        });
    </script>
</body>
</html>
